name: Security audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      # Install the dependencies only, never the local package itself: right
      # after a version bump (before the release) that version is not on PyPI
      # yet, and --strict would fail on the unauditable local distribution.
      - name: Install dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Audit installed dependencies
        run: pip-audit --strict --desc

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
